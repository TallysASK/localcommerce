{% extends "base.html" %}

{% block title %}home{% endblock %}

{% block content %}
<h1>Home</h1>
<ul>
  {% for loja in lojas %}
  <li>
    <a href="{{ url_for("store.store", username=loja.username) }}">{{ loja.viewname }}</a>
  </li>
  {% endfor %}
</ul>
{% if current_user.is_authenticated %}
<a href="{{ url_for("store.store", username=current_user.username) }}">Sua loja</a>
<p></p>
<form action="{{ url_for("auth.logout") }}" method="POST">
  <input type="submit" name="logout" value="logout">
</form>
{% else %}
<a href="{{ url_for("auth.cadastro") }}">Cadastrar sua loja</a><br>
<a href="{{ url_for("auth.login") }}">Já tem uma conta? Entrar</a>
{% endif %}
{% endblock %}
